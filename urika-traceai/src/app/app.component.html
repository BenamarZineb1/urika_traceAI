<div class="app-layout">

  <header class="mobile-top-bar">

    <div class="logo-area">
      <span class="logo-icon">U</span>
      <span class="logo-text">TraceAI</span>
    </div>

    <button
      class="burger-btn"
      (click)="toggleMobileMenu()">

      ☰
    </button>

  </header>

  <nav
    class="side-nav"
    [class.open]="isMobileMenuOpen">

    <div class="logo-area hide-on-mobile">
      <span class="logo-icon">U</span>
      <span class="logo-text">TraceAI</span>
    </div>

    <div class="nav-links">

      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        (click)="closeMobileMenu()">

        📊 Dashboard
      </a>

      <a
        routerLink="/explorer"
        routerLinkActive="active"
        (click)="closeMobileMenu()">

        🔍 Trace Explorer
      </a>

      <a
        routerLink="/workflow"
        routerLinkActive="active"
        (click)="closeMobileMenu()">

        ⚙️ Workflow
      </a>

    </div>

    @if (uiService.selectedTrace()) {

      <div
        class="ai-active-indicator"
        (click)="closeMobileMenu()">

        ✨ Analyse IA active

      </div>

    }

  </nav>

  <div
    class="sidebar-overlay"
    [class.visible]="isMobileMenuOpen"
    (click)="closeMobileMenu()">
  </div>

  <main class="content-area">

    <div class="responsive-container">

      <router-outlet></router-outlet>

    </div>

  </main>

  @if (uiService.selectedTrace(); as activeTrace) {

    <app-ai-panel
      [trace]="activeTrace"
      (close)="uiService.closeAnalysis()">
    </app-ai-panel>

  }

</div>
