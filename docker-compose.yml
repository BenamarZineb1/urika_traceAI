version: '3.8'

services:
  # 1. Elasticsearch : Pour stocker et rechercher les Logs et les Traces (Span)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: urika_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Désactivé pour faciliter le développement local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Limite la RAM utilisée en local
    ports:
      - "9200:9200"

  # 2. Prometheus : Pour stocker les Métriques (Séries temporelles comme le CPU/RAM)
  prometheus:
    image: prom/prometheus:latest
    container_name: urika_prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # Nous ajouterons un volume plus tard pour le fichier de configuration
    # volumes:
    #   - ./prometheus.yml:/etc/prometheus/prometheus.yml

